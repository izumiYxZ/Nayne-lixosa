<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surpresa 💖</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0a1a, #4c1d95);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .inicio {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s;
    }

    .inicio.sumir {
      opacity: 0;
      pointer-events: none;
    }

    .inicio img {
      width: 120px;
      animation: balancar 2s infinite ease-in-out;
    }

    @keyframes balancar {
      0%,100% { transform: rotate(0); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
    }

    .fala {
      margin-bottom: 10px;
      background: #7c3aed;
      color: #f3e8ff;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 16px;
      box-shadow: 0 0 15px rgba(124,58,237,0.6);
    }

    .cartaContainer {
      position: absolute;
      width: 300px;
      opacity: 0;
      transition: opacity 1s;
    }

    .cartaContainer.mostrar {
      opacity: 1;
    }

    .envelope {
      width: 100%;
      height: 180px;
      background: #5b21b6;
      border-radius: 10px;
      position: relative;
      z-index: 1;
      transition: opacity 0.5s;
    }

    .envelope.sumir {
      opacity: 0;
    }

    .tampa {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #7c3aed;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
    }

    .abrir .tampa {
      animation: abrir 0.8s forwards;
    }

    @keyframes abrir {
      to { transform: rotateX(180deg); }
    }

    .carta {
      position: relative;
      width: 90%;
      margin: auto;
      background: #f5f3ff;
      border-radius: 12px;
      padding: 15px;
      box-sizing: border-box;
      margin-top: -120px;
      z-index: 3;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .texto {
      color: #4c1d95;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background: #4c1d95;
      animation: piscar 1s infinite;
    }

    @keyframes piscar {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* 🔥 BOTÃO ESCONDIDO (FINAL) */
    .segredo {
      margin-top: 10px;
      width: 100%;
      height: 20px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .segredo.mostrar {
      opacity: 0.1; /* quase invisível */
    }

    /* TEXTO SECRETO */
    .secretoTexto {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: #7c3aed;
      color: #f3e8ff;
      padding: 20px;
      border-radius: 20px;
      font-size: 18px;
      text-align: center;
      box-shadow: 0 0 20px rgba(124,58,237,0.7);
      transition: 0.4s;
      z-index: 999;
    }

    .secretoTexto.mostrar {
      transform: translate(-50%, -50%) scale(1);
    }

  </style>
</head>
<body>

  <div class="inicio" onclick="abrirCarta()">
    <div class="fala">clica aqui sua sebosa 🙄</div>
    <img src="axolote.png">
  </div>

  <div class="cartaContainer" id="carta">
    <div class="envelope" id="envelope">
      <div class="tampa"></div>
    </div>

    <div class="carta">
      <div class="texto" id="texto"></div>

      <!-- BOTÃO FINAL -->
      <div class="segredo" id="segredoBtn" onclick="mostrarSegredo()"></div>
    </div>
  </div>

  <div class="secretoTexto" id="segredoTexto">
    volta a flertar cmg ):,juro q sou bonzinho
    (finge q aqui tem a figurinha da formiguinha triste 
    deu preguiça de botar, to a 4 horas fazendo isso)
  </div>

  <script>
    function abrirCarta() {
      document.querySelector(".inicio").classList.add("sumir");

      setTimeout(() => {
        let carta = document.getElementById("carta");
        carta.classList.add("mostrar");
        carta.classList.add("abrir");

        escreverTexto();
      }, 800);

      setTimeout(() => {
        document.getElementById("envelope").classList.add("sumir");
      }, 2000);
    }

    function escreverTexto() {
      const texto = `Feliz aniversário 💜

FELIZZZ ANIVERSÁRIO

TO NERVOSO N SEI OQ ESCREVER

parabéns pelos seus 17 anos vei, (não parece q vc tem 17 nunca mas ok) a gente se conhece a muito pouco tempo mesmo ne? Faz nem 1 mes mas tipo, ja te achei MUITO legal de verdade, sei nem como expressar isso mas espero q vc entenda 😭😭


Sei q as coisas ficaram meio esquisitas entre a gente pelo oq aconteceu e tals mas eu realmente n qro parar de conversar ctg, gosto mt de ti, msm q a gente se conheça a pouquinho tempo ja sinto um afeto e consideração gigante por vc, nao sei mt sobre vc, na real n sei quase nada 😿, ja q vc nunca me conta, mas ja to acostumado com seu jeito de sebosa mesmo

Quero q vc saiba o quao difícil pra mim e me aproximar tanto de alguém, e vc meio q conseguiu isso de mim(espero q o site n bugue com pontuações, se tiver bugado eu me mato na sua frente) acho q n sei mt oq mais falar, sendo sincero n sou mt bom com isso e acho q o texto ja ta gigante 😭, qria ter feito algo mais bonitinho pra vc, mas nem merecendo vc ta, e eu tbm ODEIO fazer site, tipo muito mesmo

E isso nay espero q vc aproveite de verdade seu dia, desculpa pelas coisas q aconteceram, meio q eu confundi as coisas e tals mas n qro entrar nesse assunto ja q isso aqui e um negocinho pro seu aniversário, fique bem viu e isso, gosto mt de vc 😿, de verdade 

(Coloquei um botão escondido se quiser procurar boa sorte 😝)`;

      const el = document.getElementById("texto");
      let i = 0;

      function digitar() {
        if (i < texto.length) {
          el.innerHTML = texto.substring(0, i + 1) + '<span class="cursor"></span>';
          i++;
          setTimeout(digitar, 35);
        } else {
          el.innerHTML = texto;

          // MOSTRA BOTÃO NO FINAL
          document.getElementById("segredoBtn").classList.add("mostrar");
        }
      }

      digitar();
    }

    function mostrarSegredo() {
      document.getElementById("segredoTexto").classList.add("mostrar");
    }
  </script>

</body>
</html>
