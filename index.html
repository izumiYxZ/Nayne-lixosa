<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surpresa 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0a1a, #4c1d95);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ===== TELA INICIAL ===== */
    .inicio {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s;
    }

    .inicio.sumir {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes balancar {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(-5deg); }
      100% { transform: rotate(0deg); }
    }

    .inicio img {
      width: 120px;
      animation: balancar 2s infinite ease-in-out;
    }

    .fala {
      margin-bottom: 10px;
      background: #7c3aed;
      color: #f3e8ff;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 16px;
      position: relative;
      animation: aparecer 0.5s ease-out;
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.6);
    }

    .fala::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 12px;
      border-style: solid;
      border-color: #7c3aed transparent transparent transparent;
    }

    @keyframes aparecer {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===== CARTA ===== */
    .cartaContainer {
      position: absolute;
      width: 300px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s;
    }

    .cartaContainer.mostrar {
      opacity: 1;
      pointer-events: all;
    }

    .envelope {
      width: 100%;
      height: 180px;
      background: #5b21b6;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }

    .tampa {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #7c3aed;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
    }

    .abrir .tampa {
      animation: abrir 1s ease forwards;
    }

    @keyframes abrir {
      to { transform: rotateX(180deg); }
    }

    /* CARTA REAL */
    .carta {
      width: 90%;
      margin: auto;
      background: #ede9fe;
      border-radius: 10px;
      padding: 15px;
      box-sizing: border-box;
      margin-top: -120px;

      max-height: 0;
      overflow: hidden;
    }

    .abrir .carta {
      animation: expandir 2s ease forwards;
      animation-delay: 1s;
    }

    @keyframes expandir {
      from { max-height: 0; }
      to { max-height: 300px; }
    }

    /* TEXTO */
    .texto {
      color: #4c1d95;
      font-size: 14px;
      line-height: 1.6;
    }

    .linha {
      opacity: 0;
      transform: translateY(10px);
      animation: aparecerTexto 0.6s forwards;
    }

    .linha:nth-child(1) { animation-delay: 2s; }
    .linha:nth-child(2) { animation-delay: 3s; }
    .linha:nth-child(3) { animation-delay: 4s; }
    .linha:nth-child(4) { animation-delay: 5s; }
    .linha:nth-child(5) { animation-delay: 6s; }
    .linha:nth-child(6) { animation-delay: 7s; }

    @keyframes aparecerTexto {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>
<body>

  <!-- INICIO -->
  <div class="inicio" onclick="abrirCarta()">
    <div class="fala">clica aqui sua sebosa 🙄</div>
    <img src="axolote.png" alt="Axolote">
  </div>

  <!-- CARTA -->
  <div class="cartaContainer" id="carta">
    <div class="envelope">
      <div class="tampa"></div>
    </div>

    <div class="carta">
      <div class="texto">
        <div class="linha">Feliz aniversário 💜</div>
        <div class="linha">Eu fiz esse site só pra você 😏</div>
        <div class="linha">Espero que você goste, mesmo sendo simples</div>
        <div class="linha">Você é muito especial pra mim</div>
        <div class="linha">e eu queria fazer algo diferente</div>
        <div class="linha">(apenas o começo…)</div>
      </div>
    </div>
  </div>

  <script>
    function abrirCarta() {
      document.querySelector(".inicio").classList.add("sumir");

      setTimeout(() => {
        let carta = document.getElementById("carta");
        carta.classList.add("mostrar");
        carta.classList.add("abrir");
      }, 800);
    }
  </script>

</body>
</html>
