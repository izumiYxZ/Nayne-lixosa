<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surpresa 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1a0f2e, #3b0764);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .container:hover {
      transform: scale(1.05);
    }

    /* animação do axolote */
    @keyframes balancar {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(-5deg); }
      100% { transform: rotate(0deg); }
    }

    img {
      width: 120px;
      max-width: 80%;
      height: auto;
      animation: balancar 2s infinite ease-in-out;
    }

    /* balão de fala */
    .fala {
  margin-bottom: 10px;
  background: #9333ea;
  box-shadow: 0 0 15px rgba(147, 51, 234, 0.6); /* roxo bonito */
  color: #f3e8ff; /* texto claro levemente roxo */
  padding: 10px 15px;
  border-radius: 20px;
  font-size: 16px;
  text-align: center;
  max-width: 220px;
  position: relative;
      }
    }

    .fala::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-width: 10px;
  border-style: solid;
  border-color: #7c3aed transparent transparent transparent;
    }
    }
  </style>

</head>
<body>

  <div class="container" onclick="entrar()">

    <div class="fala">clica aqui sua sebosa 🙄</div>

    <img src="axolote.png" alt="Axolote">

  </div>

  <script>
    function entrar() {
      document.body.style.transition = "opacity 0.8s";
      document.body.style.opacity = "0";

      setTimeout(() => {
        alert("Aqui vai abrir a carta 😏");
      }, 800);
    }
  </script>

</body>
</html>
