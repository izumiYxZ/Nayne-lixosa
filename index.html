<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surpresa 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .container:hover {
      transform: scale(1.05);
    }

    img {
      width: 120px;
      max-width: 80%;
      height: auto;
      margin-bottom: 12px;
    }

    .fala {
      background: #fda4af;
      color: #1e293b;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 16px;
      position: relative;
      text-align: center;
      max-width: 220px;
    }

    .fala::after {
      content: "";
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 10px;
      border-style: solid;
      border-color: transparent transparent #fda4af transparent;
    }
  </style>

</head>
<body>

  <div class="container" onclick="entrar()">
    
    <img src="axolote.png">
    
    <div class="fala">clica aqui sua sebosa 🙄</div>

  </div>

  <script>
    function entrar() {
      document.body.style.transition = "opacity 0.8s";
      document.body.style.opacity = "0";

      setTimeout(() => {
        // depois você pode trocar pra carta.html
        alert("Aqui vai abrir a carta 😏");
      }, 800);
    }
  </script>

</body>
</html>
