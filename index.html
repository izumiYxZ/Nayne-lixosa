<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surpresa 💖</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0a1a, #4c1d95);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* INICIO */
    .inicio {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s;
    }

    .inicio.sumir {
      opacity: 0;
      pointer-events: none;
    }

    .inicio img {
      width: 120px;
      animation: balancar 2s infinite ease-in-out;
    }

    @keyframes balancar {
      0%,100% { transform: rotate(0); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
    }

    .fala {
      margin-bottom: 10px;
      background: #7c3aed;
      color: #f3e8ff;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 16px;
      box-shadow: 0 0 15px rgba(124,58,237,0.6);
    }

    /* CARTA */
    .cartaContainer {
      position: absolute;
      width: 300px;
      opacity: 0;
      transition: opacity 1s;
    }

    .cartaContainer.mostrar {
      opacity: 1;
    }

    .envelope {
      width: 100%;
      height: 180px;
      background: #5b21b6;
      border-radius: 10px;
      position: relative;
      z-index: 1;
      transition: opacity 0.5s;
    }

    .envelope.sumir {
      opacity: 0;
    }

    .tampa {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #7c3aed;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
    }

    .abrir .tampa {
      animation: abrir 0.8s forwards;
    }

    @keyframes abrir {
      to { transform: rotateX(180deg); }
    }

    /* CARTA VISUAL */
    .carta {
      position: relative;
      width: 90%;
      margin: auto;
      background: #f5f3ff; /* 💜 NOVO FUNDO */
      border-radius: 12px;
      padding: 15px;
      box-sizing: border-box;
      margin-top: -120px;
      z-index: 3;

      /* leve sombra pra destacar */
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    /* TEXTO */
    .texto {
      color: #4c1d95;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
      word-wrap: break-word;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background: #4c1d95;
      animation: piscar 1s infinite;
    }

    @keyframes piscar {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

  </style>
</head>
<body>

  <!-- INICIO -->
  <div class="inicio" onclick="abrirCarta()">
    <div class="fala">clica aqui sua sebosa 🙄</div>
    <img src="axolote.png">
  </div>

  <!-- CARTA -->
  <div class="cartaContainer" id="carta">
    <div class="envelope" id="envelope">
      <div class="tampa"></div>
    </div>

    <div class="carta">
      <div class="texto" id="texto"></div>
    </div>
  </div>

  <script>
    function abrirCarta() {
      document.querySelector(".inicio").classList.add("sumir");

      setTimeout(() => {
        let carta = document.getElementById("carta");
        carta.classList.add("mostrar");
        carta.classList.add("abrir");

        escreverTexto();
      }, 800);

      setTimeout(() => {
        document.getElementById("envelope").classList.add("sumir");
      }, 2000);
    }

    function escreverTexto() {
      const texto = `Feliz aniversário 💜

Eu fiz esse site só pra você 😏
Espero que você goste, mesmo sendo simples

Você é muito especial pra mim
e eu queria fazer algo diferente

(apenas o começo…)`;

      const el = document.getElementById("texto");
      let i = 0;

      function digitar() {
        if (i < texto.length) {
          el.innerHTML = texto.substring(0, i + 1) + '<span class="cursor"></span>';
          i++;
          setTimeout(digitar, 35);
        } else {
          el.innerHTML = texto;
        }
      }

      digitar();
    }
  </script>

</body>
</html>
