<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surpresa 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0a1a, #4c1d95);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ===== TELA INICIAL ===== */
    .inicio {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s;
    }

    .inicio.sumir {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes balancar {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(-5deg); }
      100% { transform: rotate(0deg); }
    }

    .inicio img {
      width: 120px;
      animation: balancar 2s infinite ease-in-out;
    }

    .fala {
      margin-bottom: 10px;
      background: #7c3aed;
      color: #f3e8ff;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 16px;
      position: relative;
      animation: aparecer 0.5s ease-out;
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.6);
    }

    .fala::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 12px;
      border-style: solid;
      border-color: #7c3aed transparent transparent transparent;
    }

    @keyframes aparecer {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===== CARTA ===== */
    .cartaContainer {
      position: absolute;
      width: 300px;
      height: 220px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s;
    }

    .cartaContainer.mostrar {
      opacity: 1;
      pointer-events: all;
    }

    .envelope {
      width: 100%;
      height: 100%;
      background: #5b21b6;
      border-radius: 10px;
      position: absolute;
      bottom: 0;
      z-index: 1;
      transition: opacity 0.5s ease;
    }

    .envelope.sumir {
      opacity: 0;
    }

    .tampa {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #7c3aed;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
      z-index: 2;
    }

    .abrir .tampa {
      animation: abrir 0.8s ease forwards;
    }

    @keyframes abrir {
      to { transform: rotateX(180deg); }
    }

    .carta {
      position: absolute;
      width: 90%;
      left: 5%;
      bottom: 10px;
      background: #ede9fe;
      border-radius: 10px;
      padding: 15px;
      box-sizing: border-box;
      transform: translateY(100%);
      z-index: 3;
    }

    .abrir .carta {
      animation: sair 1s ease forwards;
      animation-delay: 0.8s;
    }

    @keyframes sair {
      to { transform: translateY(-120px); }
    }

    /* TEXTO DIGITANDO */
    .texto {
      color: #4c1d95;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }

    /* cursor piscando */
    .cursor {
      display: inline-block;
      width: 2px;
      background: #4c1d95;
      margin-left: 2px;
      animation: piscar 1s infinite;
    }

    @keyframes piscar {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

  </style>
</head>
<body>

  <!-- INICIO -->
  <div class="inicio" onclick="abrirCarta()">
    <div class="fala">clica aqui sua sebosa 🙄</div>
    <img src="axolote.png" alt="Axolote">
  </div>

  <!-- CARTA -->
  <div class="cartaContainer" id="carta">
    <div class="envelope" id="envelope">
      <div class="tampa"></div>
    </div>

    <div class="carta">
      <div class="texto" id="texto"></div>
    </div>
  </div>

  <script>
    function abrirCarta() {
      document.querySelector(".inicio").classList.add("sumir");

      setTimeout(() => {
        let carta = document.getElementById("carta");
        carta.classList.add("mostrar");
        carta.classList.add("abrir");

        escreverTexto();
      }, 800);

      setTimeout(() => {
        document.getElementById("envelope").classList.add("sumir");
      }, 2000);
    }

    function escreverTexto() {
      const texto = `Feliz aniversário 💜

Eu fiz esse site só pra você 😏
Espero que você goste, mesmo sendo simples

Você é muito especial pra mim
e eu queria fazer algo diferente

(apenas o começo…)
hejehejekksskksksjd



jsiejeiwjsoswjkwjwoqkwisis
sjsuwiwiiw



jejeiwiwi`;

      const elemento = document.getElementById("texto");
      let i = 0;

      function digitar() {
        if (i < texto.length) {
          elemento.innerHTML = texto.substring(0, i + 1) + '<span class="cursor"></span>';
          i++;
          setTimeout(digitar, 35); // velocidade
        } else {
          elemento.innerHTML = texto; // remove cursor no final
        }
      }

      digitar();
    }
  </script>

</body>
</html>
